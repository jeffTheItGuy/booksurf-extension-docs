<header id="hero" class="hero">
  <div class="hero-bg"></div>
  <div class="container hero-content">
    <div class="section-header">
      <span class="section-badge">Booksurf Chrome Extension</span>
      <h2>Reclaim your newtab</h2>
      <p>Organize, quickly access and easily import/export your bookmarks.</p>
    </div>
    <div class="hero-actions">
      <a href="docs.html#getting-started" class="btn btn-primary btn-lg">Get Started →</a>
      <a href="https://chromewebstore.google.com/detail/booksurf-newtab-speeddial/efanllipbjjbpobljkgohhcolahbhpdn" class="btn btn-secondary btn-lg" target="_blank">Download Extension</a>
    </div>
    <div class="hero-preview">
      <div class="browser-mockup">
        <div class="browser-bar">
          <div class="browser-tabs">
            <div class="browser-tab active">
              <span class="tab-title">New Tab</span>
              <button class="tab-close">&times;</button>
            </div>
          </div>
          <div class="browser-address-bar">
            <!-- The Favicon -->
            <img src="./assets/google.svg" alt="Google" class="address-favicon">
            <!-- The URL and Blinking Cursor -->
            <span class="url-text">
              <span class="typing-cursor">|</span>
            </span>
          </div>
        </div>
        <div class="browser-content">
          <div class="carousel">
            <button class="carousel-btn prev" aria-label="Previous Slide">&#10094;</button>
            <div class="carousel-track">
              <img src="./assets/screen1.png" alt="Screen 1" class="carousel-slide">
              <img src="./assets/screen2.png" alt="Screen 2" class="carousel-slide">
              <img src="./assets/screen3.png" alt="Screen 3" class="carousel-slide">
              <img src="./assets/screen4.png" alt="Screen 4" class="carousel-slide">
            </div>
            <button class="carousel-btn next" aria-label="Next Slide">&#10095;</button>
            <div class="carousel-dots">
              <button class="dot active" data-slide="0"></button>
              <button class="dot" data-slide="1"></button>
              <button class="dot" data-slide="2"></button>
              <button class="dot" data-slide="3"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
